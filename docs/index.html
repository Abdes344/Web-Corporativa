<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodLogistic S.A.</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins', sans-serif;}

body {
  background:black;
  color:white;
  overflow-x:hidden;
}

header {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.8);
  z-index:10;
}

nav a {
  color:white;
  margin:0 10px;
  cursor:pointer;
  text-decoration:none;
}

nav a:hover {color:cyan;}

/* 🔥 FIX IMPORTANT: NO DISPLAY NONE AQUÍ */
.page {
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding-top:80px;
}

/* SOLO ESTA CLASE CONTROLA VISIBILIDAD */
.page.active {
  display:flex;
}

input, textarea {
  display:block;
  width:250px;
  margin:8px auto;
  padding:8px;
}

button {
  padding:10px;
  background:cyan;
  border:none;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  <nav>
    <a onclick="showPage('inici')">Inici</a>
    <a onclick="showPage('contacte')">Contacte</a>
  </nav>
</header>

<!-- INICI -->
<section id="inici" class="page active">
  <h1>FoodLogistic S.A.</h1>
  <p>Logística alimentària moderna 🚚</p>
</section>

<!-- CONTACTE -->
<section id="contacte" class="page">
  <h2>Contacte</h2>

  <input type="text" placeholder="Nom">
  <input type="email" placeholder="Email">
  <textarea placeholder="Missatge"></textarea>

  <button onclick="enviarMissatge()">Enviar</button>
</section>

<!-- ÈXIT -->
<section id="enviat" class="page">
  <h2>✅ Missatge enviat amb èxit!</h2>
  <p>Gràcies per contactar amb nosaltres.</p>
  <button onclick="showPage('inici')">Tornar a l'inici</button>
</section>

<script>

/* 🔥 FIX IMPORTANT: NO USES display inline JS */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');
}

function enviarMissatge() {
  const nom = document.querySelector("#contacte input[type='text']");
  const email = document.querySelector("#contacte input[type='email']");
  const msg = document.querySelector("#contacte textarea");

  if (!nom.value || !email.value || !msg.value) {
    alert("Omple tots els camps");
    return;
  }

  nom.value = "";
  email.value = "";
  msg.value = "";

  showPage("enviat");
}

</script>

</body>
</html>
