<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodLogistic S.A.</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#111;
  color:white;
}

header {
  position:fixed;
  top:0;
  width:100%;
  background:#000;
  padding:15px;
}

nav a {
  color:white;
  margin-right:15px;
  cursor:pointer;
}

.page {
  display:none;
  padding-top:100px;
  text-align:center;
  min-height:100vh;
}

.page.active {
  display:block;
}

input, textarea {
  display:block;
  margin:10px auto;
  padding:8px;
  width:250px;
}

button {
  padding:10px;
  background:cyan;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <nav>
    <a onclick="showPage('inici')">Inici</a>
    <a onclick="showPage('contacte')">Contacte</a>
  </nav>
</header>

<!-- INICI -->
<section id="inici" class="page active">
  <h1>FoodLogistic S.A.</h1>
  <p>Logística alimentària 🚚</p>
</section>

<!-- CONTACTE -->
<section id="contacte" class="page">
  <h2>Contacte</h2>

  <input type="text" placeholder="Nom">
  <input type="email" placeholder="Email">
  <textarea placeholder="Missatge"></textarea>

  <button onclick="enviarMissatge()">Enviar</button>
</section>

<!-- ÈXIT -->
<section id="enviat" class="page">
  <h2>✅ Missatge enviat amb èxit</h2>
  <p>Gràcies per contactar amb nosaltres</p>

  <button onclick="showPage('inici')">Tornar</button>
</section>

<script>
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');
}

function enviarMissatge() {
  const inputs = document.querySelectorAll("#contacte input, #contacte textarea");

  if (!inputs[0].value || !inputs[1].value || !inputs[2].value) {
    alert("Omple tots els camps");
    return;
  }

  inputs.forEach(i => i.value = "");

  showPage("enviat");
}
</script>

</body>
</html>
