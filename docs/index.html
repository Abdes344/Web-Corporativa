<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodLogistic S.A.</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
  text-transform: uppercase;
}

/* FONDO ESPACIO REAL */
body {
  background: black url('https://www.transparenttextures.com/patterns/stardust.png');
  color: white;
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(0,0,0,0.8);
}

nav a {
  color: white;
  cursor: pointer;
  padding: 8px 15px;
  transition: 0.3s;
}

nav a:hover {
  border: 1px solid cyan;
  color: cyan;
}

/* SECCIONES */
.page {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  animation: fade 0.5s;
}

.active {
  display: flex;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* TITULOS */
h1 {font-size: 3em;}
h2 {margin-bottom: 20px;}

/* SERVEIS */
.services {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 10px;
  width: 250px;
  transition: 0.3s;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.card:hover {
  border: 1px solid cyan;
  transform: scale(1.05);
}

/* FORM */
input, textarea {
  width: 250px;
  margin: 5px;
  padding: 8px;
}

button {
  padding: 10px;
  margin-top: 10px;
  background: cyan;
  border: none;
}

/* FOOTER */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  text-align: center;
  font-size: 12px;
}
</style>

</head>

<body>

<nav>
  <a onclick="showPage('inici')">INICI</a>
  <a onclick="showPage('serveis')">SERVEIS</a>
  <a onclick="showPage('sobre')">SOBRE</a>
  <a onclick="showPage('contacte')">CONTACTE</a>
</nav>

<!-- INICI -->
<section id="inici" class="page active">
  <h1>FOODLOGISTIC S.A.</h1>
  <p>LOGÍSTICA ALIMENTÀRIA MODERNA</p>
</section>

<!-- SERVEIS -->
<section id="serveis" class="page">
  <h2>SERVEIS</h2>
  <div class="services">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d">
      <p>TRANSPORT</p>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1553413077-190dd305871c">
      <p>MAGATZEM</p>
    </div>
  </div>
</section>

<!-- SOBRE -->
<section id="sobre" class="page">
  <h2>SOBRE NOSALTRES</h2>
  <p>EMPRESA DE LOGÍSTICA ALIMENTÀRIA</p>
</section>

<!-- CONTACTE -->
<section id="contacte" class="page">
  <h2>CONTACTE</h2>
  <input placeholder="NOM">
  <input placeholder="EMAIL">
  <textarea placeholder="MISSATGE"></textarea>
  <button>ENVIAR</button>
</section>

<footer>
  © 2026 FOODLOGISTIC
</footer>

<script>
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
